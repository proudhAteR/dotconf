[fill]
symbol = " "

[git_branch]
symbol = "ïگک "
style = "bg:red"
format = '[[ $symbol$branch ](fg:crust bg:red)]($style)'

[git_status]
style = "bg:red"
format = '[[($all_status$ahead_behind )](fg:crust bg:red)]($style)'
modified = "*"
stashed = ""
deleted = ""
renamed = ""
typechanged = ""
untracked = ""
staged = ""
ahead = "[â‡،](bold green bg:red)[${count}](fg:crust bg:red)"
